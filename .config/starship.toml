format = """
${custom.zsh}\
${custom.bash}\
${custom.fish}\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
${custom.git_host}\
$all\
"""

[directory]
truncation_length=0

[custom.zsh]
command = "echo 🚀"
when = """ test "$STARSHIP_SHELL" "==" "zsh" """
format = "$output "
ignore_timeout = true

[custom.bash]
command = "echo 🐚" 
when = """ test "$STARSHIP_SHELL" "==" "bash" """
format = "$output "
ignore_timeout = true

[custom.fish]
command = "echo 🐟"
when = """ test "$STARSHIP_SHELL" = "fish" """
format = "$output "
ignore_timeout = true

[custom.git_host]
command = """
URL=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$URL" =~ "github" ]]; then
    ICON=""
elif [[ "$URL" =~ "gitlab" ]]; then
    ICON=""
elif [[ "$URL" =~ "bitbucket" ]];then
    ICON=""
elif [[ "$URL" =~ "kernel" ]];then
    ICON=""
elif [[ "$URL" =~ "archlinux" ]];then
    ICON=""
elif [[ "$URL" =~ "gnu" ]];then
    ICON=""
elif [[ "$URL" =~ "git" ]];then
    ICON=""
else
    ICON=""
fi
printf "%s" "$ICON"
"""
directories = [".git"]
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash","--norc","--noprofile"]
style = "bright-yellow bold"
format = "at [$output]($style) "
