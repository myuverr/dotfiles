# video settings
# cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1" #! Video > Aspect Ratio
# cycle video-unscaled                         #! Video > Scale Mode
# cycle-values panscan 0 1                     #! Video > Pan & Scan
# script-binding uosc/items                    #! Video > Playlist / File Overview
BS           no-osd set video-aspect-override -1; no-osd set panscan 0; no-osd set video-unscaled no; no-osd set brightness 0; no-osd set contrast 0; no-osd set saturation 0; no-osd set gamma 0; no-osd set hue 0; show-text "Video Settings Reset" #! Video > Reset Video Settings

